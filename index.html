<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LITTLE HELP CONNECT 料金シミュレーター</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Helvetica Neue', Arial, sans-serif;
    background: #f5f7fa;
    color: #1a1a2e;
    padding: 24px;
    min-height: 100vh;
  }
  h1 { font-size: 18px; font-weight: 700; color: #00b900; margin-bottom: 4px; }
  .subtitle { font-size: 12px; color: #888; margin-bottom: 24px; }

  .input-section {
    background: #fff;
    border-radius: 12px;
    padding: 20px 24px;
    margin-bottom: 20px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.07);
  }
  .input-section label { font-size: 13px; font-weight: 600; color: #444; display: block; margin-bottom: 8px; }
  .slider-row { display: flex; align-items: center; gap: 16px; }
  input[type=range] { flex: 1; accent-color: #00b900; }
  .val-display { font-size: 22px; font-weight: 700; color: #00b900; min-width: 110px; text-align: right; white-space: nowrap; }
  .val-unit { font-size: 13px; color: #888; font-weight: 400; }

  .cards {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 20px;
  }
  .card {
    background: #fff;
    border-radius: 12px;
    padding: 18px 20px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    border-top: 4px solid #ccc;
  }
  .card.std { border-color: #4f8ef7; }
  .card.ent { border-color: #f7a24f; }
  .card-title { font-size: 11px; font-weight: 700; letter-spacing: 0.5px; margin-bottom: 14px; }
  .card.std .card-title { color: #4f8ef7; }
  .card.ent .card-title { color: #f7a24f; }
  .fee-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; }
  .fee-label { font-size: 12px; color: #aaa; }
  .fee-val { font-size: 13px; color: #666; }
  .fee-total { font-size: 20px; font-weight: 700; color: #1a1a2e; }
  .best-badge {
    display: inline-block;
    background: #e8fbe8;
    color: #00b900;
    font-size: 11px;
    font-weight: 700;
    border-radius: 20px;
    padding: 3px 12px;
    margin-top: 10px;
  }
  .divider { border: none; border-top: 1px solid #f0f0f0; margin: 10px 0; }

  .breakeven {
    background: #fff;
    border-radius: 12px;
    padding: 18px 24px;
    margin-bottom: 20px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.07);
  }
  .breakeven h2 { font-size: 13px; font-weight: 700; color: #444; margin-bottom: 10px; }
  .be-row { display: flex; align-items: center; gap: 10px; font-size: 13px; margin-bottom: 4px; }
  .be-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .be-val { font-weight: 700; color: #1a1a2e; }

  .chart-section {
    background: #fff;
    border-radius: 12px;
    padding: 18px 20px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.07);
  }
  .chart-section h2 { font-size: 13px; font-weight: 700; color: #444; margin-bottom: 10px; }
  .legend { display: flex; gap: 18px; margin-bottom: 10px; flex-wrap: wrap; }
  .leg-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: #555; }
  .leg-swatch { width: 20px; height: 3px; border-radius: 2px; }
  canvas { display: block; width: 100%; }
  .marker-note {
    background: #fff8e1;
    border: 1px solid #ffc107;
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 12px;
    color: #b8860b;
    margin-top: 12px;
  }
</style>
</head>
<body>

<h1>📊 LITTLE HELP CONNECT 料金シミュレーター</h1>
<p class="subtitle">スタンダード vs エンタープライズ 比較（すべて税込）／ 損益分岐点：84,001通</p>

<div class="input-section">
  <label>月間送信通数</label>
  <div class="slider-row">
    <input type="range" id="slider" min="0" max="150000" step="1000" value="59000">
    <div class="val-display"><span id="dispVal">59,000</span><span class="val-unit"> 通</span></div>
  </div>
</div>

<div class="cards">
  <div class="card std" id="cardStd"></div>
  <div class="card ent" id="cardEnt"></div>
</div>

<div class="breakeven">
  <h2>💡 損益分岐点（スタンダード → エンタープライズが有利になる通数）</h2>
  <div class="be-row">
    <div class="be-dot" style="background:#e05c5c"></div>
    <span>分岐点：</span><span class="be-val">84,001 通</span>
    <span style="font-size:12px;color:#aaa;">（それ以上でエンタープライズが有利）</span>
  </div>
</div>

<div class="chart-section">
  <h2>料金比較グラフ（0〜150,000通）</h2>
  <div class="legend">
    <div class="leg-item"><div class="leg-swatch" style="background:#4f8ef7"></div>スタンダード</div>
    <div class="leg-item"><div class="leg-swatch" style="background:#f7a24f"></div>エンタープライズ</div>
    <div class="leg-item"><div style="width:2px;height:14px;background:#00b900;border-radius:1px"></div>現在の通数</div>
    <div class="leg-item"><div style="width:20px;height:2px;background:repeating-linear-gradient(to right,#e05c5c 0,#e05c5c 4px,transparent 4px,transparent 8px)"></div>損益分岐点</div>
  </div>
  <canvas id="chart"></canvas>
  <div class="marker-note" id="markerNote"></div>
</div>

<script>
// 料金計算（すべて税込）
function calcStd(n) {
  // スタンダード: 固定¥33,000（税込）、無料45,000通、追加¥2.2/通（税込）
  return 33000 + Math.max(0, n - 45000) * 2.2;
}
function calcEnt(n) {
  // エンタープライズ: 固定¥118,800（税込）、無料100,000通、追加¥1.1/通（税込）
  return 118800 + Math.max(0, n - 100000) * 1.1;
}

const BEP = 84001;
const MIN_N = 0, MAX_N = 150000, STEPS = 150;

const pts = { std: [], ent: [] };
for (let i = 0; i <= STEPS; i++) {
  const n = MIN_N + (MAX_N - MIN_N) * i / STEPS;
  pts.std.push(calcStd(n));
  pts.ent.push(calcEnt(n));
}

let curN = 59000;
const canvas = document.getElementById('chart');
const ctx = canvas.getContext('2d');

function drawChart() {
  const W = canvas.clientWidth || 640;
  const H = 260;
  canvas.width = W; canvas.height = H;
  const PAD = { left: 80, right: 16, top: 16, bottom: 36 };
  const minY = 0;
  const maxY = 250000;

  function tx(n) { return PAD.left + (n - MIN_N) / (MAX_N - MIN_N) * (W - PAD.left - PAD.right); }
  function ty(v) { return PAD.top + (1 - (v - minY) / (maxY - minY)) * (H - PAD.top - PAD.bottom); }

  ctx.clearRect(0, 0, W, H);

  // Y grid
  [50000, 100000, 150000, 200000].forEach(v => {
    const y = ty(v);
    ctx.strokeStyle = '#eee'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(PAD.left, y); ctx.lineTo(W - PAD.right, y); ctx.stroke();
    ctx.fillStyle = '#bbb'; ctx.font = '10px sans-serif'; ctx.textAlign = 'right';
    ctx.fillText((v / 10000) + '万円', PAD.left - 6, y + 4);
  });

  // X grid & labels
  [0, 30000, 45000, 60000, 84000, 100000, 120000, 150000].forEach(n => {
    const x = tx(n);
    ctx.strokeStyle = '#f0f0f0'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(x, PAD.top); ctx.lineTo(x, H - PAD.bottom); ctx.stroke();
    ctx.fillStyle = '#bbb'; ctx.font = '9px sans-serif'; ctx.textAlign = 'center';
    const label = n === 0 ? '0' : (n % 10000 === 0 ? (n/10000)+'万' : (n/10000).toFixed(1)+'万');
    ctx.fillText(label, x, H - PAD.bottom + 14);
  });

  // X axis
  ctx.strokeStyle = '#ddd'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(PAD.left, H - PAD.bottom); ctx.lineTo(W - PAD.right, H - PAD.bottom); ctx.stroke();

  // Lines
  function drawLine(arr, color) {
    ctx.beginPath(); ctx.strokeStyle = color; ctx.lineWidth = 2.5; ctx.setLineDash([]);
    for (let i = 0; i <= STEPS; i++) {
      const x = PAD.left + (W - PAD.left - PAD.right) * i / STEPS;
      const y = ty(arr[i]);
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.stroke();
  }
  drawLine(pts.ent, '#f7a24f');
  drawLine(pts.std, '#4f8ef7');

  // BEP line
  const bx = tx(BEP);
  ctx.strokeStyle = '#e05c5c'; ctx.lineWidth = 1.5; ctx.setLineDash([4, 3]);
  ctx.beginPath(); ctx.moveTo(bx, PAD.top); ctx.lineTo(bx, H - PAD.bottom); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = '#e05c5c'; ctx.font = 'bold 9px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('BEP 8.4万通', bx, PAD.top + 10);

  // Current line
  const cx = tx(curN);
  ctx.strokeStyle = '#00b900'; ctx.lineWidth = 2.5;
  ctx.beginPath(); ctx.moveTo(cx, PAD.top); ctx.lineTo(cx, H - PAD.bottom); ctx.stroke();

  // Dots
  function interp(arr) {
    const ni = (curN - MIN_N) / (MAX_N - MIN_N) * STEPS;
    const i0 = Math.min(Math.floor(ni), STEPS - 1);
    return arr[i0] + (arr[Math.min(i0+1, STEPS)] - arr[i0]) * (ni - i0);
  }
  [[interp(pts.std), '#4f8ef7'], [interp(pts.ent), '#f7a24f']].forEach(([v, c]) => {
    ctx.beginPath(); ctx.arc(cx, ty(v), 5, 0, Math.PI * 2);
    ctx.fillStyle = c; ctx.fill();
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.5; ctx.stroke();
  });
}

function fmt(v) { return '¥' + Math.round(v).toLocaleString() + '（税込）'; }

function update() {
  curN = parseInt(document.getElementById('slider').value);
  document.getElementById('dispVal').textContent = curN.toLocaleString();

  const std = calcStd(curN);
  const ent = calcEnt(curN);
  const best = std <= ent ? 'std' : 'ent';
  const stdExtra = Math.max(0, curN - 45000);
  const entExtra = Math.max(0, curN - 100000);

  document.getElementById('cardStd').innerHTML = `
    <div class="card-title">スタンダード（現在のプラン）</div>
    <div class="fee-row"><span class="fee-label">月額固定費</span><span class="fee-val">¥33,000</span></div>
    <div class="fee-row"><span class="fee-label">無料通数</span><span class="fee-val">45,000通</span></div>
    <div class="fee-row"><span class="fee-label">追加${stdExtra > 0 ? stdExtra.toLocaleString()+'通 × ¥2.2' : '0通'}</span><span class="fee-val">${stdExtra > 0 ? '¥'+Math.round(stdExtra*2.2).toLocaleString() : '¥0'}</span></div>
    <hr class="divider">
    <div class="fee-row"><span class="fee-label">合計（税込）</span><span class="fee-total">¥${Math.round(std).toLocaleString()}</span></div>
    ${best === 'std' ? '<div class="best-badge">✓ この通数ではこちらが有利</div>' : ''}
  `;

  document.getElementById('cardEnt').innerHTML = `
    <div class="card-title">エンタープライズ</div>
    <div class="fee-row"><span class="fee-label">月額固定費</span><span class="fee-val">¥118,800</span></div>
    <div class="fee-row"><span class="fee-label">無料通数</span><span class="fee-val">100,000通</span></div>
    <div class="fee-row"><span class="fee-label">追加${entExtra > 0 ? entExtra.toLocaleString()+'通 × ¥1.1' : '0通'}</span><span class="fee-val">${entExtra > 0 ? '¥'+Math.round(entExtra*1.1).toLocaleString() : '¥0'}</span></div>
    <hr class="divider">
    <div class="fee-row"><span class="fee-label">合計（税込）</span><span class="fee-total">¥${Math.round(ent).toLocaleString()}</span></div>
    ${best === 'ent' ? '<div class="best-badge">✓ この通数ではこちらが有利</div>' : ''}
  `;

  const diff = Math.abs(std - ent);
  const diffText = std <= ent
    ? `スタンダードの方が月 ¥${Math.round(diff).toLocaleString()} お得`
    : `エンタープライズの方が月 ¥${Math.round(diff).toLocaleString()} お得`;

  document.getElementById('markerNote').textContent =
    `現在 ${curN.toLocaleString()} 通 ｜ スタンダード ¥${Math.round(std).toLocaleString()} ／ エンタープライズ ¥${Math.round(ent).toLocaleString()} ｜ ${diffText}`;

  drawChart();
}

document.getElementById('slider').addEventListener('input', update);
window.addEventListener('resize', () => drawChart());
update();
</script>
</body>
</html>
